<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title>Add Product</title>
  </head>
  <body>
<div th:replace="~{fragments/admin-navbar :: navbar}"></div>

    <div class ="container  my-5 p-5" >
    <h4 class="text-center">Add Product</h4>
    <form th:action="@{/admin/save}" th:object="${product}" method="post"   enctype="multipart/form-data">

    <input type="hidden" th:field="*{id}">

<label>Product Name</label>
    <input type="text" th:field="*{name}" placeholder="Product Name" class="form-control" required>

<label>Price</label>
    <input type="number" th:field="*{price}" placeholder="Price" class="form-control" required>

<label>Quantity</label>
    <input type="number" th:field="*{quantity}" placeholder="Quantity" class="form-control">


<label>Description</label>
    <textarea th:field="*{description}" placeholder="Description" class="form-control"></textarea>

<label>Image</label>

<input type="file"name="imageFile" class="form-control mt-2" accept="image/*">

<label>Show on Home</label>
<input type="checkbox" name="showOnHome" th:checked="${product.showOnHome}">





    <button type="submit" class="btn btn-success mt-2">Save</button>
</form>
     <p th:if="${successmessage}" style="color:green;">  [[${successmessage}]] </p>
 <p th:if="${errormessage}" style="color:green;">
                        [[${errormessage}]]
                    </p>
  </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    -->
  </body>
</html>
