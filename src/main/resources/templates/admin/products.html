<html lang="en">
  <head>
   
    <meta charset="utf-8">

    <title>Product</title>
  </head>
  <body>
   
      <nav class="navbar navbar-expand-lg navbar-light bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand text-white" href="#"> Store</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active text-white" aria-current="page" href="#">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link  text-white" href="admin_product">Products</a>
        </li>
        <li class="nav-item">
          <a class="nav-link  text-white" href="add_product">Add-Products</a>
        </li>
        <li class="nav-item">
          <a class="nav-link  text-white" href="my_order">Orders </a>
        </li>
        
        <li class="nav-item">
          <a class="nav-link  text-white" href="my_book">Logout</a>
        </li>
        
      </ul>
      
    </div>
  </div>
</nav>
   


   

<div class="container text-center my-5">

<table class="table">
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Description</th>
      <th>Price</th>
       <th>Category</th>
    <th>Action</th>
    </tr>
  </thead>

  <tbody>
    <tr th:each="b : ${product}">
      <td th:text="${b.id}"></td>
      <td th:text="${b.name}"></td>
      <td th:text="${b.decription}"></td>
      <td th:text="${b.price}"></td>
 <td th:text="${b.category}"></td>
      <td>
        <a class="btn btn-secondary btn-sm"
           th:href="@{/mylist/{id}(id=${b.id})}">
           Add to MyBook
        </a>

        <a th:href="@{/deleteMylist/{id}(id=${b.id})}">
          <span class="material-symbols-outlined">delete</span>
        </a>

        <a th:href="@{/editBook/{id}(id=${b.id})}">
          <span class="material-symbols-outlined">edit_square</span>
        </a>
      </td>
    </tr>
  </tbody>
</table>

</div>
