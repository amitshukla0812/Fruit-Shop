<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.com">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">


<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
	crossorigin="anonymous">

<title>Edit Product</title>
</head>
<body>

<div th:replace="~{fragments/admin-navbar :: navbar}"></div>


<div class="container my-5 p-5">
    <h4 class="text-center">Edit Product</h4>

    <form th:action="@{/admin/edit}"
          th:object="${product}"
          method="post"
          enctype="multipart/form-data">

        <input type="hidden" th:field="*{id}">

        <label>Product Name</label>
        <input type="text" th:field="*{name}" class="form-control" required>

        <label>Price</label>
        <input type="number" th:field="*{price}" class="form-control" required>

        <label>Quantity</label>
        <input type="number" th:field="*{quantity}" class="form-control">

        <label>Description</label>
        <textarea th:field="*{description}" class="form-control"></textarea>

        <label>Image</label>
        <input type="file" name="imageFile" class="form-control mt-2" accept="image/*">

<label>Show on Home</label>
<input type="checkbox" name="showOnHome" th:checked="${product.showOnHome}">
        <button type="submit" class="btn btn-success mt-2">Save</button>
    </form>
</div>



	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
		crossorigin="anonymous"></script>

    -->
</body>
</html>
