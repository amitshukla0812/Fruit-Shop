<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <title>User Navbar</title>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3"
     th:fragment="navbar">

    <div class="container-fluid">
        <a class="navbar-brand text-white" th:href="@{#}">User</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

              <li class="nav-item">
                    <a class="nav-link text-white"  th:href="@{/ProductOnUser}">Products</a>
                </li>
               

                <li class="nav-item">
                    <a class="nav-link text-white" th:href="@{/Add-Cart}">Cart</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-white"  th:href="@{/my-orders}"> Orders</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-danger" th:href="@{/logout}">Logout</a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
